name: Build & Release

on:
  push:
    branches:
      - main
      - hml
      - dev

jobs:
  build:
    runs-on: windows-latest  # Electron Windows precisa buildar no Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      # --- DEV: só builda, não publica ---
      - name: Build (dev)
        if: github.ref == 'refs/heads/dev'
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

     # HML
      - name: Build & Publish pre-release (hml)
        if: github.ref == 'refs/heads/hml'
        run: npm run build:publish -- -c.publish.releaseType=prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# MAIN
      - name: Build & Publish release (main)
        if: github.ref == 'refs/heads/main'
        run: npm run build:publish -- -c.publish.releaseType=release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

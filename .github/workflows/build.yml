name: Build & Release

on:
  push:
    branches:
      - main
      - hml
      - dev

jobs:
  build:
    runs-on: windows-latest  # Electron Windows precisa buildar no Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      # --- DEV: só builda, não publica ---
      - name: Build (dev)
        if: github.ref == 'refs/heads/dev'
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- HML: publica como pre-release ---
      - name: Build & Publish (hml)
        if: github.ref == 'refs/heads/hml'
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENV: hml
          # Marca como pre-release automaticamente via electron-builder

      # --- MAIN: publica release oficial ---
      - name: Build & Publish (main)
        if: github.ref == 'refs/heads/main'
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENV: production
